<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <title>Student Management System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="p-4">
    <h2 class="mb-4">ระบบจัดการนักศึกษา (Student Management System)</h2>

    <!-- ฟอร์มเพิ่มนักศึกษา -->
    <div class="card p-3 mb-4">
      <h5>➕ เพิ่มนักศึกษา</h5>
      <div class="row g-3">
        <div class="col-md-2">
          <input id="id" type="text" class="form-control" placeholder="Student ID" />
        </div>
        <div class="col-md-1">
          <input id="title_name" type="text" class="form-control" placeholder="คำนำหน้า" />
        </div>
        <div class="col-md-2">
          <input id="first_name" type="text" class="form-control" placeholder="ชื่อ" />
        </div>
        <div class="col-md-2">
          <input id="last_name" type="text" class="form-control" placeholder="นามสกุล" />
        </div>
        <div class="col-md-2">
          <input id="email" type="email" class="form-control" placeholder="อีเมล" />
        </div>
        <div class="col-md-1">
          <input id="year" type="number" class="form-control" placeholder="ชั้นปี" />
        </div>
        <div class="col-md-1">
          <input id="major" type="text" class="form-control" placeholder="สาขา" />
        </div>
        <div class="col-md-1">
          <button id="addBtn" class="btn btn-primary w-100">เพิ่ม</button>
        </div>
      </div>
    </div>

    <!-- ค้นหาด้วยชื่อ -->
    <div class="card p-3 mb-4">
      <h5>🔍 ค้นหาด้วยชื่อ</h5>
      <div class="input-group">
        <input id="searchName" type="text" class="form-control" placeholder="ป้อนชื่อที่ต้องการค้นหา" />
        <button id="searchNameBtn" class="btn btn-success">ค้นหา</button>
      </div>
    </div>

    <!-- ค้นหาด้วยสาขา -->
    <div class="card p-3 mb-4">
      <h5>🔍 ค้นหาด้วยสาขาวิชา</h5>
      <div class="input-group">
        <input id="searchMajor" type="text" class="form-control" placeholder="ป้อนสาขาที่ต้องการค้นหา" />
        <button id="searchMajorBtn" class="btn btn-warning">ค้นหา</button>
      </div>
    </div>

    <!-- ค้นหาด้วย Email -->
    <div class="card p-3 mb-4">
      <h5>🔍 ค้นหาด้วย Email</h5>
      <div class="input-group">
        <input id="searchEmail" type="email" class="form-control" placeholder="ป้อน Email ที่ต้องการค้นหา" />
        <button id="searchEmailBtn" class="btn btn-info">ค้นหา</button>
      </div>
    </div>

    <!-- ตารางแสดงข้อมูล -->
    <table class="table table-bordered table-striped">
      <thead>
        <tr>
          <th width="120">ID</th>
          <th width="100">คำนำหน้า</th>
          <th>ชื่อ</th>
          <th>นามสกุล</th>
          <th>อีเมล</th>
          <th width="80">ชั้นปี</th>
          <th width="100">สาขา</th>
        </tr>
      </thead>
      <tbody id="studentTableBody"></tbody>
    </table>

    <script type="module" src="./dist/app.js"></script>
  </body>
</html>
